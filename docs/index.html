<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="assets/OC_Logo.svg" type="image/svg+xml" />
    <title>OpenChat</title>
    <link rel="stylesheet" href="assets/site.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="topbar__brand" href="index.html" aria-label="OpenChat home">
          <span class="topbar__logo-wrap">
            <img class="topbar__logo" src="assets/OC_Logo.svg" alt="" />
            <span class="topbar__title" aria-hidden="true">OpenChat</span>
          </span>
        </a>

        <nav class="topbar__actions" aria-label="Site">
          <a class="topbar__link topbar__link--active" href="index.html">News</a>
          <a class="topbar__link" href="download.html">Download</a>
          <a
            class="topbar__icon-btn"
            href="https://github.com/OpenChatGit/News"
            aria-label="OpenChat News repository on GitHub"
            title="OpenChatGit/News on GitHub"
            target="_blank"
            rel="noopener noreferrer"
          >
            <svg class="topbar__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.435 1.845.66 1.065 1.23 2.76.885 3.435.675.105-.78.42-1.23.765-1.515-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"
              />
            </svg>
          </a>
        </nav>
      </header>

      <div class="page-body">
        <main class="main-view" aria-label="Article">
          <nav class="news-nav" id="news-nav" aria-label="News list"></nav>
          <div class="news-content">
            <article class="news-article" id="news-article" aria-live="polite"></article>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="assets/site.js"></script>
  </body>
</html>
